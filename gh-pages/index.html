<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Propiedades de Límites</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        .katex-display { margin: 0.5em 0; overflow-x: auto; overflow-y: hidden; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <div class="max-w-4xl mx-auto p-4 md:p-6 w-full flex-grow flex flex-col">
        
        <!-- Encabezado -->
        <header class="mb-6 text-center shrink-0">
            <h1 class="text-3xl font-extrabold text-blue-700 mb-2">Quiz: Aplicando Propiedades</h1>
            <p class="text-slate-600">
                Aplica las propiedades de los límites paso a paso (de afuera hacia adentro) hasta evaluar el límite por completo.
            </p>
        </header>

        <!-- Barra de progreso -->
        <div class="w-full bg-slate-200 rounded-full h-2.5 mb-6">
            <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Contenedor principal del Ejercicio -->
        <main class="flex-grow flex flex-col bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            
            <!-- Zona de la pizarra matemática -->
            <div class="bg-slate-800 p-6 flex-grow flex flex-col items-center justify-start overflow-y-auto" id="math-board">
                <!-- Los pasos matemáticos se inyectarán aquí -->
            </div>

            <!-- Zona de interacción -->
            <div class="p-6 bg-slate-50 border-t border-slate-200 shrink-0">
                <div id="feedback-container" class="hidden mb-4 p-3 rounded-lg text-sm font-semibold text-center transition-all"></div>
                
                <h3 id="question-text" class="text-lg font-bold text-slate-700 mb-4 text-center">
                    ¿Qué propiedad debemos aplicar primero?
                </h3>
                
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <!-- Los botones de opciones se generarán aquí -->
                </div>

                <div id="next-level-container" class="hidden mt-4 text-center">
                    <button onclick="nextLevel()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105">
                        Siguiente Ejercicio ➔
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- BASE DE DATOS DE EJERCICIOS ---
        const levels = [
            {
                // Ejercicio 1: Polinomio simple
                initialTex: "\\lim_{x \\to 3} (4x - 5)",
                steps: [
                    {
                        question: "La expresión principal es una resta. ¿Qué propiedad se debe aplicar?",
                        options: ["Propiedad de la Suma/Resta", "Propiedad del Producto", "Propiedad del Múltiplo Constante", "Propiedad de la Potencia"],
                        correctOption: 0,
                        tex: "\\lim_{x \\to 3} (4x) - \\lim_{x \\to 3} (5)",
                        successMsg: "¡Correcto! El límite de una resta es la resta de los límites."
                    },
                    {
                        question: "En el primer término se tiene '4x'. ¿Qué propiedad se debe aplicar?",
                        options: ["Propiedad de la Constante", "Propiedad del Cociente", "Propiedad del Múltiplo Constante", "Propiedad de la Identidad"],
                        correctOption: 2,
                        tex: "4 \\cdot \\left[ \\lim_{x \\to 3} x \\right] - \\lim_{x \\to 3} (5)",
                        successMsg: "¡Excelente! La constante (4) sale fuera del límite."
                    },
                    {
                        question: "Observe las funciones, ¿Qué propiedad/propiedades se debe aplicar?",
                        options: ["Propiedad de la Potencia", "Prop. de la Identidad y de la Constante", "Propiedad de la Raíz", "No se puede resolver"],
                        correctOption: 1,
                        tex: "4 \\cdot (3) - 5 = 12 - 5 = \\mathbf{7}",
                        successMsg: "¡Perfecto!  Se ha evaluado el límite con éxito."
                    }
                ]
            },
            {
                // Ejercicio 2: Fracción
                initialTex: "\\lim_{x \\to 2} \\frac{x^2 + 1}{3x}",
                steps: [
                    {
                        question: "¿Cuál es la operación más externa que abarca toda la función?",
                        options: ["Propiedad de la Potencia", "Propiedad de la Suma/Resta", "Propiedad del Cociente", "Propiedad del Producto"],
                        correctOption: 2,
                        tex: "\\frac{\\lim_{x \\to 2} (x^2 + 1)}{\\lim_{x \\to 2} (3x)}",
                        successMsg: "¡Bien! Separamos el límite arriba y abajo."
                    },
                    {
                        question: "Observe el numerador y el denominador. ¿Qué propiedades se debe aplicar a continuación a ambos al mismo tiempo?",
                        options: ["Prop. de la Raíz y Prop. del Producto", "Prop. de la Suma y Prop. del Múltiplo Constante", "Evaluación Directa", "Prop. de la Potencia solamente"],
                        correctOption: 1,
                        tex: "\\frac{\\lim_{x \\to 2} (x^2) + \\lim_{x \\to 2} (1)}{3 \\cdot \\lim_{x \\to 2} (x)}",
                        successMsg: "¡Exacto! Se separa la suma arriba y se saca el 3 abajo."
                    },
                    {
                        question: "Aún queda un exponente en el numerador. ¿Qué propiedad usamos?",
                        options: ["Propiedad de la Potencia", "Propiedad de la Raíz", "Propiedad del Producto", "Propiedad de la Identidad"],
                        correctOption: 0,
                        tex: "\\frac{\\left[ \\lim_{x \\to 2} x \\right]^2 + \\lim_{x \\to 2} (1)}{3 \\cdot \\lim_{x \\to 2} (x)}",
                        successMsg: "¡Muy bien! El límite entra dentro de la potencia."
                    },
                    {
                        question: "Observe las funciones, ¿Qué propiedad/propiedades se debe aplicar?",
                        options: ["Evaluación: Prop. de la Identidad y de la Constante", "Propiedad de la Potencia", "Propiedad de la Raíz", "No existe el límite"],
                        correctOption: 0,
                        tex: "\\frac{(2)^2 + 1}{3 \\cdot (2)} = \\frac{4 + 1}{6} = \\mathbf{\\frac{5}{6}}",
                        successMsg: "¡Felicidades! Haz resuelto un límite racional complejo."
                    }
                ]
            },
            {
                // Ejercicio 3: Raíz
                initialTex: "\\lim_{x \\to 5} \\sqrt{3x + 1}",
                steps: [
                    {
                        question: "¿Qué operación envuelve a toda la función matemática?",
                        options: ["Propiedad de la Suma", "Propiedad del Múltiplo Constante", "Propiedad de la Raíz", "Propiedad de la Potencia"],
                        correctOption: 2,
                        tex: "\\sqrt{ \\lim_{x \\to 5} (3x + 1) }",
                        successMsg: "¡Correcto! El límite ingresa dentro del radical."
                    },
                    {
                        question: "Observe lo que hay dentro de la raíz. ¿Qué aplicamos?",
                        options: ["Propiedad de la Suma", "Propiedad del Producto", "Propiedad del Cociente", "Evaluación Directa"],
                        correctOption: 0,
                        tex: "\\sqrt{ \\lim_{x \\to 5} (3x) + \\lim_{x \\to 5} (1) }",
                        successMsg: "¡Bien hecho! Separamos los sumandos."
                    },
                    {
                        question: "¿Qué propiedad falta para aislar completamente la variable x?",
                        options: ["Propiedad del Múltiplo Constante", "Propiedad de la Identidad", "Propiedad de la Suma", "Propiedad de la Raíz"],
                        correctOption: 0,
                        tex: "\\sqrt{ 3 \\cdot \\left[ \\lim_{x \\to 5} x \\right] + \\lim_{x \\to 5} (1) }",
                        successMsg: "¡Exacto! Ya estamos listos para evaluar."
                    },
                    {
                        question: "Observe las funciones, ¿Qué propiedad/propiedades se debe aplicar?",
                        options: ["Propiedad del Producto", "Propiedad del Cociente", "Evaluación: Prop. de la Identidad y de la Constante", "Evaluación: Infinito"],
                        correctOption: 2,
                        tex: "\\sqrt{ 3 \\cdot (5) + 1 } = \\sqrt{15 + 1} = \\sqrt{16} = \\mathbf{4}",
                        successMsg: "¡Excelente! Se ha evaluado el límite mediante propiedades."
                    }
                ]
            },
            {
                // Ejercicio 4: Reto (Combinado)
                initialTex: "\\lim_{x \\to -1} \\frac{\\sqrt{5 - 4x}}{3x^2}",
                steps: [
                    {
                        question: "¿Cuál es la operación principal que engloba toda la función?",
                        options: ["Propiedad de la Raíz", "Propiedad del Cociente", "Propiedad de la Potencia", "Propiedad de la Suma"],
                        correctOption: 1,
                        tex: "\\frac{\\lim_{x \\to -1} \\sqrt{5 - 4x}}{\\lim_{x \\to -1} (3x^2)}",
                        successMsg: "¡Bien! Separamos el límite arriba y abajo."
                    },
                    {
                        question: "Observe el numerador. ¿Qué propiedad debemos aplicar?",
                        options: ["Propiedad de la Raíz", "Propiedad de la Resta", "Propiedad del Producto", "Propiedad de la Potencia"],
                        correctOption: 0,
                        tex: "\\frac{\\sqrt{\\lim_{x \\to -1} (5 - 4x)}}{\\lim_{x \\to -1} (3x^2)}",
                        successMsg: "¡Correcto! El límite ingresa al radical."
                    },
                    {
                        question: "Ahora, ¿Qué propiedades se pueden aplicar para expandir el límite? .",
                        options: ["Prop. de la Identidad y Prop. de la Potencia", "Prop. de la Resta y Prop. del Múltiplo Constante", "Prop. de la Suma y Prop. del Cociente", "Prop. de la Constante"],
                        correctOption: 1,
                        tex: "\\frac{\\sqrt{\\lim_{x \\to -1} (5) - \\lim_{x \\to -1} (4x)}}{3 \\cdot \\lim_{x \\to -1} (x^2)}",
                        successMsg: "¡Muy bien! Vamos desarmando la expresión en partes."
                    },
                    {
                        question: "Para dejar sola la 'x' en ambas partes, ¿qué propiedades faltan?",
                        options: ["Prop. del Cociente", "Prop. de la Raíz", "Prop. de la Suma", "Prop. del Múltiplo Constante y Prop. de la Potencia"],
                        correctOption: 3,
                        tex: "\\frac{\\sqrt{\\lim_{x \\to -1} (5) - 4 \\cdot \\left[\\lim_{x \\to -1} (x)\\right]}}{3 \\cdot \\left[\\lim_{x \\to -1} (x)\\right]^2}",
                        successMsg: "¡Exacto! Toda la expresión está completamente expandida y lista."
                    },
                    {
                        question: "¡Todo listo para evaluar usando las propiedades de la Identidad y la Constante! ¿Cuál es el resultado final?",
                        options: ["Evaluación: 1", "Evaluación: -1", "Evaluación: 3", "Evaluación: 0"],
                        correctOption: 0,
                        tex: "\\frac{\\sqrt{5 - 4(-1)}}{3(-1)^2} = \\frac{\\sqrt{5 + 4}}{3(1)} = \\frac{\\sqrt{9}}{3} = \\frac{3}{3} = \\mathbf{1}",
                        successMsg: "¡Felicidades! Eres un maestro aplicando las propiedades de los límites."
                    }
                ]
            }
        ];

        // --- ESTADO DEL JUEGO ---
        let currentLevelIdx = 0;
        let currentStepIdx = 0;
        const board = document.getElementById('math-board');
        const optionsGrid = document.getElementById('options-grid');
        const questionText = document.getElementById('question-text');
        const feedbackBox = document.getElementById('feedback-container');
        const nextLevelBtn = document.getElementById('next-level-container');
        const progressBar = document.getElementById('progress-bar');

        // --- FUNCIONES CORE ---
        
        // Iniciar un nivel específico
        function loadLevel(levelIdx) {
            currentLevelIdx = levelIdx;
            currentStepIdx = 0;
            board.innerHTML = ''; // Limpiar pizarra
            nextLevelBtn.classList.add('hidden');
            hideFeedback();
            
            // Actualizar barra progreso global
            const progress = ((currentLevelIdx) / levels.length) * 100;
            progressBar.style.width = `${progress}%`;

            // Mostrar estado inicial
            renderMathBlock(levels[currentLevelIdx].initialTex, true);
            
            loadStep();
        }

        // Cargar las opciones del paso actual
        function loadStep() {
            const level = levels[currentLevelIdx];
            if (currentStepIdx >= level.steps.length) {
                // Nivel completado
                questionText.innerText = "¡Ejercicio completado!";
                optionsGrid.innerHTML = '';
                
                if (currentLevelIdx < levels.length - 1) {
                    nextLevelBtn.classList.remove('hidden');
                } else {
                    progressBar.style.width = `100%`;
                    questionText.innerHTML = "🎉 ¡Has completado todos los ejercicios magistralmente! 🎉";
                }
                return;
            }

            const step = level.steps[currentStepIdx];
            questionText.innerText = step.question;
            optionsGrid.innerHTML = '';

            // Generar botones de opciones
            step.options.forEach((optText, index) => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-slate-200 hover:border-blue-500 hover:bg-blue-50 text-slate-700 font-semibold py-3 px-4 rounded-xl transition-all shadow-sm";
                btn.innerText = optText;
                btn.onclick = () => checkAnswer(index, btn);
                optionsGrid.appendChild(btn);
            });
        }

        // Renderizar un bloque de matemáticas con KaTeX
        function renderMathBlock(texString, isInitial = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `fade-in w-full text-center py-3 ${isInitial ? 'text-white' : 'text-blue-300'}`;
            
            // Agregar flecha visual si no es el primer elemento
            if (!isInitial) {
                const arrow = document.createElement('div');
                arrow.className = "text-slate-500 mb-2";
                arrow.innerHTML = "↓";
                board.appendChild(arrow);
            }

            katex.render(`\\displaystyle ${texString}`, wrapper, {
                throwOnError: false,
                displayMode: true
            });
            board.appendChild(wrapper);
            
            // Auto-scroll hacia abajo
            board.scrollTop = board.scrollHeight;
        }

        // Comprobar la respuesta del usuario
        function checkAnswer(selectedIndex, buttonElement) {
            const step = levels[currentLevelIdx].steps[currentStepIdx];
            
            if (selectedIndex === step.correctOption) {
                // Correcto
                showFeedback(step.successMsg, 'success');
                renderMathBlock(step.tex);
                currentStepIdx++;
                loadStep();
            } else {
                // Incorrecto
                buttonElement.classList.add('shake', 'border-red-500', 'bg-red-50');
                showFeedback("Esa no es la propiedad correcta para la operación más externa. ¡Inténtalo de nuevo!", 'error');
                
                setTimeout(() => {
                    buttonElement.classList.remove('shake', 'border-red-500', 'bg-red-50');
                }, 500);
            }
        }

        function showFeedback(msg, type) {
            feedbackBox.innerText = msg;
            feedbackBox.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            
            if (type === 'success') {
                feedbackBox.classList.add('bg-green-100', 'text-green-700');
            } else {
                feedbackBox.classList.add('bg-red-100', 'text-red-700');
            }
        }

        function hideFeedback() {
            feedbackBox.classList.add('hidden');
        }

        function nextLevel() {
            loadLevel(currentLevelIdx + 1);
        }

        // Iniciar el juego al cargar
        window.onload = () => {
            loadLevel(0);
        };
    </script>
</body>
</html>
